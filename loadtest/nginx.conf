# Load balance across all replicas of url-shortener-service (Docker embedded DNS).
# Variable in proxy_pass forces re-resolution so traffic spreads across replica IPs.

server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 valid=5s ipv6=off;

    location / {
        set $shortener_upstream url-shortener-service:80;
        proxy_pass http://$shortener_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
    }
}
